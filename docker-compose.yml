services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reliyo
      POSTGRES_PASSWORD: reliyo
      POSTGRES_DB: reliyo
    ports:
      - '5432:5432'
    volumes:
      - reliyo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U reliyo -d reliyo']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    profiles:
      - redis

volumes:
  reliyo_pgdata:
